<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root Cause Analysis Training - Jurassic Park</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1419;--bar:#161B22;--card:#1E2530;--border:#2A3441;--text:#E8E6E1;--text2:#F5F3EF;--muted:#B0B8C4;--dim:#8892A0;--red:#FF8A6E;--blue:#5BC0E0;--purple:#C48DD4;--green:#4DD87E;--gold:#F5D060;--crim:#F07E72;--red-bg:#E85D3A;--blue-bg:#2E86AB;--purple-bg:#7B2D8E;--green-bg:#1B813E;--gold-bg:#D4A017;--crim-bg:#C44536;--pass:#5FE88A;--fail:#F07E72}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--bar);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:10}
.topbar-inner{max-width:860px;margin:0 auto}
.topbar-title{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.badge{background:var(--red-bg);border-radius:5px;padding:3px 9px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;color:#fff;letter-spacing:1px;text-transform:uppercase}
.topbar-label{font-size:15px;font-weight:700;color:var(--text2);letter-spacing:-0.3px}
.step-nav{display:flex;gap:2px;flex-wrap:wrap}
.step-btn{flex:1;min-width:40px;padding:7px 2px;border:none;cursor:pointer;border-radius:4px;font-family:inherit;font-size:9.5px;font-weight:600}
.main{max-width:860px;margin:0 auto;padding:24px 16px 60px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.pareto-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;transition:opacity 0.2s}
.pareto-bar-row:hover{opacity:0.85}
.pareto-label{width:200px;font-size:11px;color:var(--text);text-align:right;flex-shrink:0;line-height:1.3}
.pareto-track{flex:1;height:18px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden}
.pareto-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.pareto-score{width:32px;font-size:11px;font-weight:600;color:var(--text2);text-align:right}
@media(max-width:600px){.main{padding:18px 12px 50px}.pareto-label{width:140px;font-size:10px}}
@media(max-width:400px){.pareto-label{width:110px;font-size:9px}}
</style>
</head>
<body>
<div class="topbar"><div class="topbar-inner">
<div class="topbar-title"><div class="badge">Training</div><span class="topbar-label">Root Cause Analysis - Jurassic Park</span></div>
<div class="step-nav" id="stepNav"></div>
</div></div>
<div class="main" id="mainContent"></div>
<script>
var STEPS=["intro","fishbone","pareto","prioritize","fivewhys","verify","rootcause"];
var STEP_LABELS=["Intro","Fishbone","Pareto","Prioritize","5 Whys","Verify","Root Cause"];
var CATEGORIES=[
{name:"People",icon:"\u{1F464}",color:"#FF8A6E",bg:"#E85D3A",causes:[
{id:"p1",text:"Nedry sabotaged control systems",selected:true,lane:"human",impact:9,freq:3},
{id:"p2",text:"Nedry underpaid and disgruntled",selected:true,lane:"human",impact:8,freq:4},
{id:"p3",text:"No background checks for critical staff",selected:false,impact:5,freq:3},
{id:"p4",text:"Hammond overconfidence in technology",selected:true,lane:"human",impact:9,freq:5},
{id:"p5",text:"Insufficient staffing for crisis response",selected:false,impact:4,freq:3},
{id:"p6",text:"No whistleblower / grievance mechanism",selected:true,lane:"human",impact:7,freq:4}
]},
{name:"Process",icon:"\u2699\uFE0F",color:"#5BC0E0",bg:"#2E86AB",causes:[
{id:"pr1",text:"No integrated risk management framework",selected:true,lane:"human",impact:10,freq:5},
{id:"pr2",text:"No crisis simulation or drills conducted",selected:true,lane:"environmental",impact:8,freq:4},
{id:"pr3",text:"No access-control auditing process",selected:true,lane:"human",impact:8,freq:4},
{id:"pr4",text:"Departments operated in silos",selected:true,lane:"human",impact:8,freq:5},
{id:"pr5",text:"No escalation protocol for system failures",selected:false,impact:5,freq:3},
{id:"pr6",text:"No visitor evacuation plan tested",selected:false,impact:4,freq:2}
]},
{name:"Technology",icon:"\u{1F50C}",color:"#C48DD4",bg:"#7B2D8E",causes:[
{id:"t1",text:"Centralized power grid - single point of failure",selected:true,lane:"technical",impact:10,freq:5},
{id:"t2",text:"No redundant / backup power systems",selected:true,lane:"technical",impact:10,freq:5},
{id:"t3",text:"Fence systems lacked mechanical fail-safes",selected:true,lane:"technical",impact:9,freq:4},
{id:"t4",text:"Security system could be disabled by one user",selected:true,lane:"human",impact:9,freq:4},
{id:"t5",text:"No real-time dinosaur tracking independent of fences",selected:false,impact:5,freq:3},
{id:"t6",text:"Automated systems lacked manual override capability",selected:false,impact:4,freq:3}
]},
{name:"Environment",icon:"\u{1F300}",color:"#4DD87E",bg:"#1B813E",causes:[
{id:"e1",text:"Tropical storm struck during operations",selected:true,lane:"environmental",impact:10,freq:4},
{id:"e2",text:"Infrastructure not weatherproofed",selected:true,lane:"environmental",impact:9,freq:4},
{id:"e3",text:"No environmental stress testing performed",selected:true,lane:"environmental",impact:8,freq:5},
{id:"e4",text:"Remote island location delayed external help",selected:false,impact:5,freq:5},
{id:"e5",text:"Biological risks of live dinosaurs underestimated",selected:false,impact:6,freq:3}
]},
{name:"Management",icon:"\u{1F4CB}",color:"#F5D060",bg:"#D4A017",causes:[
{id:"m1",text:"Cost-cutting prioritized over safety redundancy",selected:true,lane:"technical",impact:9,freq:5},
{id:"m2",text:"No independent safety oversight / audits",selected:true,lane:"human",impact:9,freq:5},
{id:"m3",text:"Employee concerns systematically dismissed",selected:true,lane:"human",impact:8,freq:5},
{id:"m4",text:"Leadership lacked risk management expertise",selected:false,impact:6,freq:4},
{id:"m5",text:"Spared no expense masked real gaps",selected:true,lane:"environmental",impact:8,freq:5}
]},
{name:"Measurement",icon:"\u{1F4CA}",color:"#F07E72",bg:"#C44536",causes:[
{id:"ms1",text:"No KPIs for system resilience or safety",selected:true,lane:"technical",impact:8,freq:5},
{id:"ms2",text:"Breeding anomalies went undetected",selected:false,impact:5,freq:2},
{id:"ms3",text:"No monitoring of employee satisfaction",selected:true,lane:"human",impact:7,freq:5},
{id:"ms4",text:"Containment integrity never independently verified",selected:false,impact:6,freq:3}
]}
];
var LANES={
technical:{name:"Technical / System Failure",color:"#C48DD4",bg:"#7B2D8E",icon:"\u{1F50C}",sources:"Technology + Measurement + Management",whys:[
{q:"Why did the containment systems fail?",a:"The electric fences lost power, and no backup system existed to maintain containment barriers."},
{q:"Why was there no backup system?",a:"The park relied on a single centralized power grid. The architecture had no redundancy - one failure cascaded across every system park-wide."},
{q:"Why was a single-grid architecture chosen?",a:"System design prioritized cost-effectiveness and streamlined operations. No one challenged the architecture because the budget did not allocate for redundancy, and no resilience KPIs existed to flag the gap."},
{q:"Why were resilience requirements not built into the design specs?",a:"Leadership operated in silos - Hammond focused on spectacle, Arnold on daily operations. There was no integrated risk framework to evaluate systemic vulnerabilities across departments."},
{q:"Why did no cross-functional risk review exist?",a:"Overconfidence in engineering excellence (spared no expense) created a false sense of security. Decision-makers assumed technical brilliance alone would handle edge cases, so resilience was never treated as a design requirement."}
]},
environmental:{name:"Environmental / Planning Failure",color:"#4DD87E",bg:"#1B813E",icon:"\u{1F300}",sources:"Environment + Process + Management",whys:[
{q:"Why did the tropical storm cause system-wide damage?",a:"The park infrastructure was not weatherproofed or hardened for severe tropical weather - a foreseeable threat on a tropical island."},
{q:"Why was the infrastructure not weatherproofed?",a:"No environmental stress testing or crisis simulations were ever conducted. The park was never tested against the conditions its own location guaranteed."},
{q:"Why were no stress tests or crisis drills performed?",a:"There was no risk assessment process that accounted for environmental threats. The tropical storm scenario was treated as unlikely despite the island geography."},
{q:"Why was a foreseeable environmental risk treated as unlikely?",a:"The spared no expense rhetoric created overconfidence - leadership believed engineering quality alone would handle any conditions, so environmental planning was deprioritized."},
{q:"Why did overconfidence override basic risk planning?",a:"No independent safety oversight existed to challenge leadership assumptions. Without external audits or a culture of questioning, blind spots became systemic."}
]},
human:{name:"Human / Organizational Failure",color:"#FF8A6E",bg:"#E85D3A",icon:"\u{1F464}",sources:"People + Process + Technology + Management + Measurement",whys:[
{q:"Why was Nedry able to sabotage the entire park?",a:"The security system could be disabled by a single user. No access-control auditing, role separation, or monitoring existed to prevent or detect insider actions."},
{q:"Why did Nedry choose to sabotage the system?",a:"Nedry was disgruntled - underpaid and undervalued. His grievances went unaddressed, and no whistleblower or dispute resolution mechanism existed."},
{q:"Why were Nedry grievances ignored?",a:"Employee concerns were systematically dismissed. Management had no process for monitoring employee satisfaction or handling compensation disputes - especially for staff with critical system access."},
{q:"Why did management lack these basic HR and security safeguards?",a:"Departments operated in silos with no integrated risk framework. No one connected unhappy employee + total system access + no oversight as a compounding risk."},
{q:"Why did the organization fail to see this interconnected risk?",a:"The culture deprioritized employee well-being and internal security in favor of innovation and cost containment. Without independent oversight, the organization was blind to the human risks it was creating."}
]}
};
var BAD_CHAIN=[{q:"Why did dinosaurs escape?",a:"Fences lost power."},{q:"Why did fences lose power?",a:"Nedry disabled the system."},{q:"Why did Nedry disable the system?",a:"He was underpaid."},{q:"Why was he underpaid?",a:"Budget was tight."},{q:"Why was the budget tight?",a:"The park was expensive to build."}];
var TESTS=[
{id:"therefore",name:"Therefore Test",subtitle:"Reverse Logic Check",icon:"\u{1F504}",color:"#5BC0E0",question:"Read the chain bottom-up. Does each step logically cause the next?",howItWorks:"Start at the root cause and read upward. Every link should feel like a necessary and sufficient cause.",failMeans:"A link in your chain is a logical leap. You conflated two causes or skipped a step.",whatToDo:"Go back to the broken link and re-answer that specific why. Stay in 5 Whys - just fix the chain.",goodResult:{pass:true,detail:"All 3 lanes read logically bottom-up. Each step is a necessary cause of the one above it."},badResult:{pass:true,detail:"Surprisingly, this PASSES! The chain sounds perfectly logical. This is exactly why the Therefore Test alone is not enough."}},
{id:"sowhat",name:"So What? Test",subtitle:"Sufficiency Check",icon:"\u{1F3AF}",color:"#F5D060",question:"If we fix ONLY this root cause, does the problem fully go away?",howItWorks:"At your proposed root cause, ask: If we had addressed this single thing, would the incident have been completely prevented?",failMeans:"Your root cause is incomplete. You found a contributing factor but not the full picture.",whatToDo:"Go back to your fishbone. You likely have unaccounted high-priority causes that need their own lane.",goodResult:{pass:true,detail:"Fixing leadership culture + integrated risk management would have driven redundant systems, stress testing, AND employee safeguards. All three paths to failure are blocked."},badResult:{pass:false,detail:"FAILS. If we made the budget bigger, Nedry might be happier - but the tropical storm still knocks out the non-redundant, non-weatherproofed power grid. Dinosaurs still escape."}},
{id:"evidence",name:"Evidence Test",subtitle:"Data Verification",icon:"\u{1F50D}",color:"#C48DD4",question:"What data or evidence supports each why answer?",howItWorks:"For every answer, ask: How do we KNOW this is true? Can you point to incident logs, interviews, metrics, design docs?",failMeans:"You followed intuition instead of evidence. The chain feels right but may be factually wrong.",whatToDo:"Pause the 5 Whys and gather data - pull logs, interview stakeholders, review records.",goodResult:{pass:true,detail:"Each answer is evidence-backed: power grid design docs show no redundancy, weather records confirm the storm, Nedry communications confirm grievances, org charts confirm siloed departments."},badResult:{pass:false,detail:"FAILS. Budget was tight - was it? Hammond literally said spared no expense. There is no evidence the budget was actually constrained."}},
{id:"control",name:"Control Test",subtitle:"Counterfactual Check (Strongest)",icon:"\u{1F6E1}\uFE0F",color:"#4DD87E",question:"If this root cause had NOT been present, would the problem still have occurred?",howItWorks:"Imagine a world where your root cause does not exist. Does the incident still happen?",failMeans:"Your proposed root cause is not the root. The problem would have happened anyway through a different path.",whatToDo:"Two options: (1) Keep digging. (2) Add parallel lanes. If multiple tests fail, escalate to FTA, FMEA, or Systems Analysis.",goodResult:{pass:true,detail:"If leadership had an integrated risk culture: they would have required redundancy (tech), stress-tested for storms (env), and caught the Nedry risk (human). All three failure paths are blocked."},badResult:{pass:false,detail:"FAILS HARD. If the park had a bigger budget but the same culture - still no redundancy, still no weatherproofing, still no employee monitoring. Dinosaurs still escape."}}
];
var DECISION_TREE=[
{test:"Therefore Test fails",icon:"\u{1F504}",color:"#5BC0E0",action:"Fix the chain",detail:"Go back to the broken link. Re-answer that why. Stay in 5 Whys.",tool:"5 Whys"},
{test:"So What? Test fails",icon:"\u{1F3AF}",color:"#F5D060",action:"Add lanes",detail:"Return to your fishbone. Find unaccounted causes. Build parallel lanes.",tool:"Fishbone + 5 Whys"},
{test:"Evidence Test fails",icon:"\u{1F50D}",color:"#C48DD4",action:"Gather data first",detail:"Pause analysis. Pull logs, interview people, review records.",tool:"FTA or Pareto"},
{test:"Control Test fails",icon:"\u{1F6E1}\uFE0F",color:"#4DD87E",action:"Keep digging or add lanes",detail:"You found a contributing factor, not the root cause.",tool:"5 Whys or FTA"},
{test:"Multiple tests fail",icon:"\u26A0\uFE0F",color:"#F07E72",action:"Escalate your method",detail:"Too complex for 5 Whys alone.",tool:"FTA / FMEA"}
];
var ROOT_CAUSE_TEXT="Decision-makers over-prioritized innovation and cost containment, lacked a holistic risk management framework, and fostered a culture that ignored environmental realities, employee grievances, and internal security. The disaster was not caused by any single failure but by the simultaneous, undetected convergence of technical fragility, environmental vulnerability, and organizational blind spots.";
var COUNTERMEASURES=[
{lane:"Technical",color:"#C48DD4",bg:"#7B2D8E",items:["Decentralized power architecture with independent backup per zone","Mechanical fail-safes on all containment barriers (power-independent)","Resilience KPIs built into system design requirements"]},
{lane:"Environmental",color:"#4DD87E",bg:"#1B813E",items:["Mandatory environmental stress testing before operations begin","Annual crisis simulations for all foreseeable scenarios","Independent safety audits with authority to halt operations"]},
{lane:"Human",color:"#FF8A6E",bg:"#E85D3A",items:["Role-based access controls - no single user can disable park-wide systems","Employee satisfaction monitoring with escalation triggers for critical-access staff","Whistleblower mechanism and formal grievance resolution process"]}
];

var currentStep=0,expandedCats={},activeLane=“technical”,revealedWhys={},verifyMode=“good”,expandedTests={},showDecisionTree=false,showCountermeasures=false,paretoAnimated=false,paretoShowCutoff=false,paretoExpandedItem=null;

function copyObj(src,extra){var o={};for(var k in src){o[k]=src[k];}if(extra){for(var k in extra){o[k]=extra[k];}}return o;}

function buildParetoData(){
var all=[];
for(var ci=0;ci<CATEGORIES.length;ci++){
var cat=CATEGORIES[ci];
for(var xi=0;xi<cat.causes.length;xi++){
var c=copyObj(cat.causes[xi],{category:cat.name,catColor:cat.color,catBg:cat.bg,score:cat.causes[xi].impact*cat.causes[xi].freq});
all.push(c);
}}
all.sort(function(a,b){return b.score-a.score;});
var total=0;for(var i=0;i<all.length;i++){total+=all[i].score;}
var cum=0;
for(var i=0;i<all.length;i++){cum+=all[i].score;all[i].cumPct=Math.round((cum/total)*100);all[i].pct=Math.round((all[i].score/total)*100);}
return{items:all,total:total};
}
var PARETO=buildParetoData();

function render(){renderStepNav();renderContent();}
function renderStepNav(){
var html=””;
for(var i=0;i<STEPS.length;i++){
var bg,color;
if(i===currentStep){bg=”#E85D3A”;color=”#fff”;}
else if(i<currentStep){bg=”#4DD87E22”;color=”#4DD87E”;}
else{bg=”#1E2530”;color=”#8892A0”;}
html+=’<button class="step-btn" onclick="goStep('+i+')" style="background:'+bg+';color:'+color+'">’+STEP_LABELS[i]+’</button>’;
}
document.getElementById(“stepNav”).innerHTML=html;
}
function goStep(i){
currentStep=i;
if(i===2){paretoAnimated=false;setTimeout(function(){paretoAnimated=true;render();},50);}
render();window.scrollTo({top:0,behavior:‘smooth’});
}
function renderContent(){
var main=document.getElementById(“mainContent”);
var step=STEPS[currentStep];
var html=””;
if(step===“intro”)html=renderIntro();
else if(step===“fishbone”)html=renderFishbone();
else if(step===“pareto”)html=renderPareto();
else if(step===“prioritize”)html=renderPrioritize();
else if(step===“fivewhys”)html=renderFiveWhys();
else if(step===“verify”)html=renderVerify();
else if(step===“rootcause”)html=renderRootCause();
html+=renderNav();
main.innerHTML=html;
main.style.animation=“none”;main.offsetHeight;main.style.animation=“fadeUp 0.4s ease”;
}

function renderIntro(){
var steps=[
{n:“1”,t:“Fishbone Diagram”,d:“Cast a wide net - brainstorm ALL potential causes across 6 categories.”},
{n:“2”,t:“Pareto Analysis”,d:“Score each cause by Impact x Frequency. Rank them to find the vital few that drive ~80% of the risk.”},
{n:“3”,t:“Prioritize into Lanes”,d:“Group the top Pareto causes into 3 investigation lanes that cross category boundaries.”},
{n:“4”,t:“5 Whys Analysis”,d:“Drill deep - trace each lane from symptom to systemic root cause.”},
{n:“5”,t:“Verify Your Logic”,d:“Run 4 tests to confirm you reached the TRUE root cause.”},
{n:“6”,t:“Root Cause and Countermeasures”,d:“See where all lanes converge and define corrective actions.”}
];
var h=’<div style="border-radius:12px;padding:24px 20px;margin-bottom:24px;background:linear-gradient(135deg,#E85D3A18 0%,#7B2D8E12 100%);border:1px solid #E85D3A33">’;
h+=’<h2 style="font-size:19px;font-weight:700;margin:0 0 6px;color:var(--text2)">What are we solving?</h2>’;
h+=’<p style="font-size:14px;color:#D1D5DB;line-height:1.7;margin:0">When dinosaurs escaped their enclosures due to the failure of critical containment systems, Jurassic Park faced catastrophic consequences: <strong style="color:var(--red)">at least five fatalities</strong> and a grave threat to the lives of guests, staff, and dinosaurs. The incident resulted in safety breaches, complete operational shutdown, and <strong style="color:var(--red)">hundreds of millions of dollars in damages</strong>.</p></div>’;
h+=’<h3 style="font-size:15px;font-weight:600;margin-bottom:12px;color:var(--gold)">Our approach</h3>’;
for(var i=0;i<steps.length;i++){
var s=steps[i];
h+=’<div style="display:flex;gap:12px;background:var(--card);border-radius:8px;padding:12px 14px;border:1px solid var(--border);margin-bottom:8px"><div style="width:26px;height:26px;border-radius:50%;background:var(--red-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff">’+s.n+’</div><div><div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:2px">’+s.t+’</div><div style="font-size:12px;color:var(--muted);line-height:1.5">’+s.d+’</div></div></div>’;
}
h+=’<div style="border-radius:8px;padding:12px 16px;font-size:13px;color:var(--muted);line-height:1.6;margin-top:6px;background:#1B813E22;border:1px solid #1B813E44"><strong style="color:var(--green)">Key lesson:</strong> Root causes do not respect category boundaries. The fishbone helps you <em>find</em> causes; the Pareto helps you <em>focus</em>; the 5 Whys helps you <em>connect</em> them; the verification tests help you <em>prove</em> them.</div>’;
return h;
}

function renderFishbone(){
var h=’<p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5">We brainstormed <strong style="color:var(--text2)">30 potential causes</strong> across 6 standard Ishikawa categories. Tap each to explore.</p>’;
h+=’<div style="border-radius:8px;padding:10px 16px;margin-bottom:14px;text-align:center;background:linear-gradient(135deg,var(--red-bg),var(--crim-bg))"><div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.85;margin-bottom:2px;color:#fff">Effect</div><div style="font-size:13px;font-weight:600;color:#fff">Dinosaurs escaped - catastrophic failure</div></div>’;
h+=’<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:8px">’;
for(var ci=0;ci<CATEGORIES.length;ci++){
var cat=CATEGORIES[ci];
var open=expandedCats[cat.name];
h+=’<div style="background:'+(open?'var(--card)':'#171D26')+';border-radius:8px;overflow:hidden;border:1px solid '+(open?cat.bg+'66':'var(--border)')+'">’;
h+=’<div onclick="toggleCat(\''+cat.name+'\')" style="padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:8px"><span style="font-size:15px">’+cat.icon+’</span><span style="font-size:13px;font-weight:600;color:'+cat.color+'">’+cat.name+’</span><span style="font-size:11px;color:var(--dim);margin-left:auto">’+cat.causes.length+’</span><span style="font-size:14px;color:var(--dim);display:inline-block;transform:'+(open?'rotate(90deg)':'rotate(0)')+'">›</span></div>’;
if(open){
h+=’<div style="padding:0 14px 12px;display:flex;flex-direction:column;gap:4px">’;
for(var xi=0;xi<cat.causes.length;xi++){
h+=’<div style="font-size:12px;color:#D1D5DB;padding:5px 8px 5px 12px;border-left:2px solid '+cat.bg+'66;background:#161B2288;border-radius:0 4px 4px 0;line-height:1.4">’+cat.causes[xi].text+’</div>’;
}
h+=’</div>’;
}
h+=’</div>’;
}
h+=’</div><div style="margin-top:14px;font-size:12px;color:var(--dim);text-align:center;font-style:italic">30 causes collected. Next: score and rank with Pareto analysis.</div>’;
return h;
}

function renderPareto(){
var items=PARETO.items,maxScore=items[0].score;
var cutoffIdx=-1;
for(var i=0;i<items.length;i++){if(items[i].cumPct>=80){cutoffIdx=i;break;}}
var aboveLine=cutoffIdx>=0?cutoffIdx+1:items.length;
var h=’<p style="font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.5">Each cause scored by <strong style="color:var(--text2)">Impact (1-10) x Frequency (1-5)</strong>. The Pareto Principle says roughly 80% of the effect comes from ~20% of the causes.</p>’;
h+=’<div style="display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap"><div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--gold)"></div><span style="font-size:11px;color:var(--muted)">Above 80% line (vital few)</span></div><div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:2px;background:var(--border)"></div><span style="font-size:11px;color:var(--muted)">Below 80% line (useful many)</span></div></div>’;
h+=’<div style="background:var(--card);border-radius:12px;padding:18px 16px;border:1px solid var(--border);margin-bottom:14px">’;
